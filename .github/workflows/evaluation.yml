name: Day 14 Evaluation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  evaluation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run required unit tests
        run: pytest tests/ -v

      - name: Run bonus framework comparison
        run: python bonus/bonus_eval.py
